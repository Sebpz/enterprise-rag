version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  Enterprise RAG Platform — Full Local Stack
#  Start everything: docker compose up -d
# ─────────────────────────────────────────────────────────────────

services:

  # ── API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql://raguser:ragpass@postgres:5432/ragdb
      - REDIS_URL=redis://redis:6379
      - LANGFUSE_HOST=http://langfuse:3000
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./:/app          # hot-reload in dev
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── VECTOR STORE ───────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  # ── RELATIONAL DB ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── CACHE + RATE LIMITING ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── LLM TRACING ────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://raguser:ragpass@postgres:5432/ragdb
      NEXTAUTH_SECRET: local-dev-secret-change-in-prod
      NEXTAUTH_URL: http://localhost:3001
      SALT: local-dev-salt
    depends_on:
      postgres:
        condition: service_healthy

  # ── METRICS ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ── DASHBOARDS ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # ── LOCAL LLM (optional — remove if using OpenAI only) ─────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # To pull a model after startup:
    # docker compose exec ollama ollama pull mistral

  # ── FRONTEND ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    # Comment out during early development — run `npm run dev` locally instead

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  ollama_data:
